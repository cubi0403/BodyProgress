<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>BodyProgress Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h1 class="mb-4">
    BodyProgress Dashboard
</h1>

<div class="row">

    <div class="col-md-6">

        <div class="card">
            <div class="card-body">

                <h3>學員總數</h3>

                <h1>{{ student_count }}</h1>

            </div>
        </div>

    </div>

    <div class="col-md-6">

        <div class="card">
            <div class="card-body">

                <h3>測量紀錄總數</h3>

                <h1>{{ measurement_count }}</h1>

            </div>
        </div>

    </div>

</div>

<br>

<a href="/form" class="btn btn-primary">
    新增資料
</a>

<a href="/students" class="btn btn-success">
    學員列表
</a>

</body>
</html>
