<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>BodyProgress</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">
BodyProgress 學員管理
</h1>

<form
    method="get"
    action="/students"
    class="row g-3 mb-4">

    <div class="col-auto">

        <input
            type="text"
            name="search"
            value="{{ search }}"
            placeholder="搜尋學員"
            class="form-control">

    </div>

    <div class="col-auto">

        <button
            type="submit"
            class="btn btn-primary">

            搜尋

        </button>

    </div>

</form>

<br>

<a href="/form" class="btn btn-primary mb-4">
新增資料
</a>

{% for student in students %}

<div class="card mb-3 shadow-sm">

    <div class="card-body d-flex justify-content-between align-items-center">

        <h4 class="mb-0">
            {{ student }}
        </h4>

        <div>

            <a
                href="/student/{{ student }}"
                class="btn btn-success">

                查看資料

            </a>

            <a
                href="/download_report/{{ student }}"
                class="btn btn-secondary">

                PDF

            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

</body>

</html>
