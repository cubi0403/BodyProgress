<!DOCTYPE html>
<html>
<head>

    <title>BodyProgress</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">
    BodyProgress Dashboard
</h1>

<form action="/submit" method="post">

    <p>姓名</p>
    <input
            class="form-control"
            type="text"
            name="name">

    <p>日期</p>
    <input type="date" name="date">

    <p>體重</p>
    <input
            class="form-control"
            type="number" step="0.1" name="weight">

    <p>體脂</p>
    <input
            class="form-control"
            type="number" step="0.1" name="bodyfat">

    <p>肌肉量</p>
    <input
            class="form-control"
            type="number" step="0.1" name="muscle">

    <p>內臟脂肪</p>
    <input
            class="form-control"
            type="number" step="0.1" name="visceral_fat">

    <br><br>

    <button
            type="submit"
            class="btn btn-primary">
            新增資料
    </button>

</form>

</div>

</body>
</html>
