<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>{{ student }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<a href="/students" class="btn btn-secondary mb-3">
← 返回學員列表
</a>

<div class="card">

<div class="card-body">

<h1 class="card-title">
{{ student }}
</h1>

<hr>

<h4>最新身體數據</h4>

<ul class="list-group">

<li class="list-group-item">
體重：{{ weight }} kg
</li>

<li class="list-group-item">
體脂：{{ bodyfat }} %
</li>

<li class="list-group-item">
肌肉量：{{ muscle }} kg
</li>

<li class="list-group-item">
內臟脂肪：{{ visceral_fat }}
</li>

</ul>
<hr>

<h4>進度分析</h4>

<ul class="list-group">

<li class="list-group-item">
體重變化：{{ weight_change }} kg
</li>

<li class="list-group-item">
體脂變化：{{ bodyfat_change }} %
</li>

<li class="list-group-item">
肌肉量變化：{{ muscle_change }} kg
</li>

<li class="list-group-item">
內臟脂肪變化：{{ visceral_change }}
</li>

</ul>
<br>
<h4 class="mt-4">體重變化</h4>

<img
    src="/chart/{{ student }}/weight"
    class="img-fluid border rounded"
>

<br>
  <br>

<h4>體脂變化</h4>

<img
    src="/chart/{{ student }}/bodyfat"
    class="img-fluid border rounded"
>
<a href="/download_report/{{ student }}"
class="btn btn-primary">

下載 PDF 報告

</a>

</div>

</div>

</body>

</html>
